name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  release:
    name: Build ZIP and Create GitHub Release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        # Tag pattern restricts to v\d+.\d+.\d+ — safe to use in subsequent env vars
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build plugin ZIP
        env:
          TAG: ${{ github.ref_name }}
        run: |
          mkdir -p "releases/${TAG}"
          zip -r "releases/${TAG}/simple-wp-helpdesk.zip" simple-wp-helpdesk/
          echo "Built: releases/${TAG}/simple-wp-helpdesk.zip"

      - name: Extract CHANGELOG entry
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          awk "/^## \[${VERSION}\]/{found=1; next} found && /^## \[/{exit} found{print}" \
            CHANGELOG.md > release_notes.md
          cat release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        env:
          TAG: ${{ github.ref_name }}
          VERSION: ${{ steps.version.outputs.VERSION }}
        with:
          tag_name: ${{ github.ref_name }}
          name: v${{ steps.version.outputs.VERSION }}
          body_path: release_notes.md
          files: releases/${{ github.ref_name }}/simple-wp-helpdesk.zip
          draft: false
          prerelease: false
