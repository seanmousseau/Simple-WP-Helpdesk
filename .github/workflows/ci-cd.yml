name: WP Plugin Testing and Security

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ---------------------------------------------------
  # JOB 1: Code Quality & Unit Testing
  # ---------------------------------------------------
  test:
    name: PHP ${{ matrix.php-versions }} Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php-versions: ['7.4', '8.0', '8.1', '8.2'] # Test across multiple PHP versions

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-versions }}
          extensions: dom, curl, libxml, mbstring, zip, pdo, mysql
          tools: composer, phpcs, phpunit
          coverage: none

      - name: Get Composer Cache Directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer Dependencies
        uses: actions/cache@v3
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install Dependencies
        run: composer install --prefer-dist --no-progress --no-suggest

      - name: Run PHP CodeSniffer (WordPress Standards)
        run: vendor/bin/phpcs --standard=WordPress --ignore=*/vendor/*,*/node_modules/* .

      - name: Run PHPUnit Tests
        # Only run if you have a phpunit.xml file configured
        run: vendor/bin/phpunit 

  # ---------------------------------------------------
  # JOB 2: Check Dependency Vulnerabilities
  # ---------------------------------------------------
  dependency-check:
    name: Check Composer Dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      # Uses the Local PHP Security Checker to find known CVEs in your vendor folder
      - name: SensioLabs Security Checker
        uses: symfonycorp/security-checker-action@v5