# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
language: "en-US"
early_access: false

reviews:
  profile: "assertive"
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  review_status: true
  collapse_walkthrough: false

  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - main
      - dev

  path_filters:
    - "!simple-wp-helpdesk/vendor/**"
    - "!vendor/**"
    - "!releases/**"
    - "!testing/screenshots/**"
    - "!testing/scripts/__pycache__/**"
    - "!*.min.js"
    - "!*.min.css"
    - "!composer.lock"
    - "!phpunit.xml"

  path_instructions:
    - path: "simple-wp-helpdesk/**/*.php"
      instructions: |
        This is a WordPress plugin (Simple WP Helpdesk). Review for:

        Security:
        - Nonce verification (wp_verify_nonce) on all form handlers
        - Capability checks: manage_options for admin actions, edit_post for ticket saves
        - All output escaped: esc_html(), esc_attr(), esc_url(), wp_kses_post()
        - All input sanitized: sanitize_text_field(), sanitize_email(), absint(), etc.
        - Token comparisons use hash_equals(), never == or ===
        - File paths validated to start with the uploads directory
        - Rate limiting via swh_get_client_ip(), never $_SERVER['REMOTE_ADDR'] directly

        Conventions:
        - All functions prefixed swh_, all classes prefixed SWH_
        - New options must be registered in swh_get_defaults() in includes/helpers.php
        - Email always sent via swh_send_email(), never wp_mail() directly
        - helpdesk_reply comment type; internal notes use _is_internal_note meta
        - No custom DB tables; uses CPT (helpdesk_ticket), post meta, wp_options, comments

        Architecture:
        - Bootstrap (simple-wp-helpdesk.php) stays thin
        - Admin-only code stays in admin/ (gated by is_admin())
        - New cron events registered in swh_activate(), cleared in swh_deactivate()
        - Schema changes must bump version and add upgrade path in swh_run_upgrade_routine()

    - path: "tests/**/*.php"
      instructions: |
        PHPUnit unit tests using WP_Mock (10up/wp_mock). Review for:
        - WP_Mock::userFunction() used to mock WordPress functions; WP_Mock::onFilter() for apply_filters
        - setUp() loads plugin files; no direct DB calls
        - Arrange/Act/Assert structure within each test method
        - Tests cover realistic WordPress behaviour (e.g. get_option returns fallback, not false, when option is unset)
        - No patchwork; WP_Mock::setUsePatchwork(false) in bootstrap

    - path: "simple-wp-helpdesk/admin/class-reporting.php"
      instructions: |
        Reporting dashboard AJAX endpoint. Extra review focus:
        - WP_Query meta_query arrays must never allow unvalidated user input to flow into 'value'
        - Transient keys must be unique and not conflict with other plugin transients (prefix swh_report_)
        - All AJAX handlers must call current_user_can('manage_options') and check_ajax_referer()
        - $wpdb->prepare() must wrap all raw SQL; no string interpolation in queries
        - found_posts access on WP_Query result is correct only when 'no_found_rows' => false (default)

    - path: "simple-wp-helpdesk/includes/class-email.php"
      instructions: |
        Email handling including inbound webhook. Extra review focus on swh_handle_inbound_email():
        - Bearer token must be validated with hash_equals(), never == or ===
        - Sender email must be validated with hash_equals(strtolower(), strtolower())
        - Subject parsed with preg_match only; no eval or dynamic regex
        - Reply body sanitized with wp_kses_post() before wp_insert_comment()
        - No SSRF risk: handler only reads from $request params, never makes outbound HTTP requests
        - Return value must always be WP_Error or rest_ensure_response() result — never raw arrays

    - path: "phpunit.xml"
      instructions: |
        PHPUnit configuration. No actionable review needed — skip.

    - path: "testing/**/*.py"
      instructions: |
        Playwright test suite for a WordPress plugin. Review for:
        - Use check() soft-fail helper instead of hard asserts where appropriate
        - State dict used for cross-section state (ticket_id, portal_url, etc.)
        - _navigate_settings() called before clicking settings to remove WP pointer overlays
        - Rate limits cleared with _clear_rate_limits() before security tests
        - required attributes stripped via JS before validation test form submits
        - wrap JS-triggered form submits in with page.expect_navigation()

    - path: ".github/workflows/**"
      instructions: |
        GitHub Actions workflow. Review for:
        - Pinned action versions (prefer full SHA or semver tags, not @main)
        - Minimal permissions (principle of least privilege)
        - Secrets referenced via ${{ secrets.NAME }}, never hardcoded

chat:
  auto_reply: true
